<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Linkedin Job Helper – Options</title>
    <style>
      body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; margin: 16px; }
      label { display:block; font-weight:600; margin-top:12px; }
      input[type="text"] { width: 100%; padding: 8px; box-sizing: border-box; }
      textarea { width: 100%; height: 220px; padding: 8px; box-sizing: border-box; font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace; }
      .row { margin-top: 8px; }
      .btns { margin-top: 16px; display:flex; gap:8px; }
      button { padding:8px 12px; }
      .hint { color:#666; font-size:12px; }
    </style>
  </head>
  <body>
    <h2>API Settings</h2>

    <label for="apiUrl">API URL</label>
    <input id="apiUrl" type="text" placeholder="https://api.example.com/v1/chat/completions" />

    <label for="apiKey">API Key <span class="hint">(optional)</span></label>
    <input id="apiKey" type="text" placeholder="sk-..." />

    <div class="row">
      <div class="hint">Request payload template (JSON). The job description and jobId will replace the user message content at runtime.</div>
      <pre class="hint" style="white-space:pre-wrap">
Expected server response (stringified JSON in assistant message):
{
  "jobId": "1234567890",
  "suitable": true
}
      </pre>
    </div>
    <textarea id="requestPayload" placeholder='{"messages":[{"role":"system","content":"..."},{"role":"user","content":"(will be replaced)"}]}'></textarea>

    <div class="btns">
      <button id="save">Save</button>
      <button id="reset">Reset to Example</button>
      <span id="status" class="row"></span>
    </div>

    <script src="options.js"></script>
  </body>
</html>
