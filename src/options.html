<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Linkedin Job Helper — Settings</title>
    <style>
      body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial; padding: 16px; }
      .row { margin-bottom: 12px; }
      label { display: block; font-weight: 600; margin-bottom: 6px; }
      input { width: 100%; padding: 8px; box-sizing: border-box; }
      .hint { color: #666; font-size: 12px; margin-top: 4px; }
      button { padding: 8px 12px; }
      #status { margin-left: 8px; font-size: 12px; }
    </style>
  </head>
  <body>
    <h1>Linkedin Job Helper — Settings</h1>

    <div class="row">
      <label for="apiUrl">API URL</label>
      <input id="apiUrl" type="url" placeholder="https://api.example.com/jobs" />
      <div class="hint">POST endpoint that accepts JSON. Example: <code>https://api.example.com/jobs</code></div>
    </div>

    <div class="row">
      <label for="apiKey">API Key</label>
      <input id="apiKey" type="password" placeholder="Your secret API key" />
      <div class="hint">Stored in <code>chrome.storage.sync</code>.</div>
    </div>

    <button id="save">Save</button><span id="status"></span>

    <script src="options.js"></script>
  </body>
</html>
